<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Expenses-Tracker</title>
        <link rel="stylesheet" href="/static/style.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ"
            crossorigin="anonymous"
        />
    </head>
    <body id="body">
        <nav class="navbar navbar-expand-lg bg-body-tertiary bg-dark" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" onclick="window.open(`https://github.com/Shevilll`, `_blank`);" style="cursor:pointer;">SheviL</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="/dashboard" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                {{month_year}}
                            </a>
                            <ul class="dropdown-menu">
                            </ul>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled">Thankyou for visiting!</a>
                        </li>
                    </ul>
                    <form action="/auth/logout" method="post" class="d-flex">
                        <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
                    </form>
                </div>
            </div>
        </nav>
        <hr>
        <div id="mainpage" data-bs-theme="dark">
            <form action="/add" method="post" id="main-form">
                <div class="input-group mb-3">
                    <span class="input-group-text">Category</span>
                    <select class="form-control" name="name" required>
                        {% for category in categories %}
                        <option value="{{ category }}">{{ category }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text">₹</span>
                    <input
                        type="number"
                        class="form-control"
                        aria-label="Amount"
                        name="price"
                        required
                        autocomplete="off"
                        min="0"
                        step="0.01"
                    />
                    <span class="input-group-text">.00</span>
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text">Description</span>
                    <input
                        type="text"
                        class="form-control"
                        name="description"
                        placeholder="enter your description"
                        autocomplete="off"
                        maxlength="500"
                    />
                </div>

                <button class="btn btn-secondary" type="submit">Submit</button>
                <hr>
            </form>

            {% if data %}
            <table class="table table-dark table-striped table-hover text-nowrap">
                <thead>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Created At</th>
                    <th id="button-form-div">Remove</th>
                </thead>
                <tbody id="table-body">
                    {% for row in data %}
                    <tr>
                        <td>{{row[0]}}</td>
                        <td>₹{{row[1]}}</td>
                        <td>{{row[2]}}</td>
                        <td>{{row[3]}}</td>
                        <td>{{row[4]}}</td>
                        <td id="button-form-div">
                            <form action="/remove" method="POST" style="display:inline;">
                                <input type="checkbox" name="items"
                                    value="{{row[0]}},{{row[1]}},{{row[2]}},{{row[3]}},{{row[4]}},{{row[5]}}"
                                    class="form-check-input"
                                />
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div id="span">
                <span>Total Expenses: ₹{{total_expenses}}</span>
            </div>
            <button type="submit" form="main-form" class="btn btn-danger" id="buttoncheckeditems" onclick="this.form.action='/remove'; this.form.submit();">Remove Checked Items</button>
            <button
                class="btn btn-danger"
                id="buttonfordiv"
                type="button"
                onclick="displaybuttonformdiv('block')">
                Remove Items
            </button>
            <button
                class="btn btn-danger"
                id="buttonforremovediv"
                type="button"
                onclick="displaybuttonformdiv('none')">
                Cancel
            </button>
            {% endif %}
        </div>
        <script src="/static/main.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
