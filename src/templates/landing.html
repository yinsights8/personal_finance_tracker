<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Expense Tracker - Login</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ"
            crossorigin="anonymous"
        />
        <style>
            body {
                background-color: rgb(21, 20, 20);
                color: rgb(255, 255, 255);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0;
            }
            .flip-card {
                background-color: transparent;
                width: 400px;
                height: 450px;
                perspective: 1000px;
            }
            .flip-card-inner {
                position: relative;
                width: 100%;
                height: 100%;
                text-align: center;
                transition: transform 0.6s;
                transform-style: preserve-3d;
            }
            .flip-card.flipped .flip-card-inner {
                transform: rotateY(180deg);
            }
            .flip-card-front, .flip-card-back {
                position: absolute;
                width: 100%;
                height: 100%;
                backface-visibility: hidden;
                border-radius: 15px;
                background-color: rgb(40, 40, 40);
                padding: 2rem;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            }
            .flip-card-front {
                background-color: rgb(40, 40, 40);
            }
            .flip-card-back {
                background-color: rgb(40, 40, 40);
                transform: rotateY(180deg);
            }
            .card-title {
                color: rgb(255, 255, 255);
                margin-bottom: 1.5rem;
                font-size: 1.8rem;
                font-weight: bold;
            }
            .form-control {
                background-color: rgb(60, 60, 60);
                color: white;
                border: 1px solid rgb(80, 80, 80);
                margin-bottom: 1rem;
            }
            .form-control:focus {
                background-color: rgb(60, 60, 60);
                color: white;
                border-color: #6c757d;
            }
            .btn-submit {
                background-color: #6c757d;
                border-color: #6c757d;
                color: white;
                width: 100%;
                padding: 0.75rem;
                font-size: 1rem;
                border-radius: 8px;
            }
            .btn-submit:hover {
                background-color: #5a6268;
                border-color: #5a6268;
            }
            .toggle-link {
                color: #adb5bd;
                cursor: pointer;
                margin-top: 1rem;
                text-decoration: underline;
            }
            .toggle-link:hover {
                color: white;
            }
            .error-div {
                background-color: rgba(220, 53, 69, 0.2);
                border: 1px solid #dc3545;
                border-radius: 8px;
                padding: 0.75rem;
                margin-bottom: 1rem;
                color: #f8d7da;
            }
            .brand {
                color: rgb(255, 255, 255);
                font-size: 2rem;
                font-weight: bold;
                margin-bottom: 2rem;
                text-align: center;
            }
            .brand span {
                color: #6c757d;
            }
            .remember-me {
                display: flex;
                align-items: center;
                margin-bottom: 1rem;
                color: #adb5bd;
            }
            .remember-me input {
                margin-right: 0.5rem;
            }
            .small-text {
                font-size: 0.75rem;
                color: #6c757d;
            }
            .req-check-ok { color: #28a745; font-weight: bold; }
        </style>
    </head>
    <body>
        <div class="flip-card" id="flipCard">
            <div class="flip-card-inner">
                <!-- Front: Login Form -->
                <div class="flip-card-front">
                    <div class="brand">Expense<span>Tracker</span></div>
                    
                    <div id="login-error" class="error-div" style="display: none;">
                        <span id="login-error-text"></span>
                    </div>
                    
                    <form action="/auth/login" method="post" id="loginForm">
                        <input type="email" class="form-control" name="email" placeholder="Email" required autocomplete="email">
                        <input type="password" class="form-control" name="password" placeholder="Password" required autocomplete="current-password">
                        
                        <div class="remember-me">
                            <input type="checkbox" id="remember_me" name="remember_me" value="on">
                            <label for="remember_me">Remember me</label>
                            <span class="small-text">(7 days)</span>
                        </div>
                        
                        <button type="submit" class="btn btn-submit">Login</button>
                    </form>
                    
                    <p class="toggle-link" onclick="flipCard()">Don't have an account? Register</p>
                </div>
                
                <!-- Back: Register Form -->
                <div class="flip-card-back">
                    <div class="brand">Expense<span>Tracker</span></div>
                    
                    <div id="register-error" class="error-div" style="display: none;">
                        <span id="register-error-text"></span>
                    </div>
                    
                    <form action="/auth/register" method="post" id="registerForm">
                        <input type="text" class="form-control" name="name" placeholder="Name" required minlength="2" maxlength="100" autocomplete="name">
                        <input type="email" class="form-control" name="email" placeholder="Email" required autocomplete="email">
                        <input type="password" class="form-control" name="password" id="register-password" placeholder="Password" required minlength="8" maxlength="72" autocomplete="new-password">
                        <div id="password-requirements" class="small-text mb-2" style="text-align: left;">
                            <div id="req-length">8-72 characters</div>
                            <div id="req-letter">At least one letter</div>
                            <div id="req-number">At least one number</div>
                            <div id="req-special">At least one special character (!@#$%^&amp;*...)</div>
                        </div>
                        <input type="password" class="form-control" name="confirm_password" placeholder="Confirm Password" required autocomplete="new-password">
                        
                        <button type="submit" class="btn btn-submit">Register</button>
                    </form>
                    
                    <p class="toggle-link" onclick="flipCard()">Already have an account? Login</p>
                </div>
            </div>
        </div>

        <script>
            function flipCard() {
                const flipCard = document.getElementById('flipCard');
                flipCard.classList.toggle('flipped');
            }

            function validatePassword(password) {
                const checks = {
                    'req-length': password.length >= 8 && password.length <= 72,
                    'req-letter': /[A-Za-z]/.test(password),
                    'req-number': /[0-9]/.test(password),
                    'req-special': /[!@#$%^&*()_+\-=\[\]{}|;':",.\/<>?\\]/.test(password),
                };
                for (const [id, valid] of Object.entries(checks)) {
                    const el = document.getElementById(id);
                    el.style.color = valid ? '#28a745' : '#6c757d';
                }
                return Object.values(checks).every(Boolean);
            }

            document.addEventListener('DOMContentLoaded', function() {
                const registerForm = document.getElementById('registerForm');
                const passwordInput = document.getElementById('register-password');

                if (passwordInput) {
                    passwordInput.addEventListener('input', function() {
                        validatePassword(this.value);
                    });
                }

                if (registerForm) {
                    registerForm.addEventListener('submit', function(e) {
                        const pw = passwordInput.value;
                        if (!validatePassword(pw)) {
                            e.preventDefault();
                            document.getElementById('register-error').style.display = 'block';
                            document.getElementById('register-error-text').textContent = 'Password does not meet requirements';
                            return;
                        }
                        const confirm = document.querySelector('input[name="confirm_password"]').value;
                        if (pw !== confirm) {
                            e.preventDefault();
                            document.getElementById('register-error').style.display = 'block';
                            document.getElementById('register-error-text').textContent = 'Passwords do not match';
                            return;
                        }
                    });
                }

                const urlParams = new URLSearchParams(window.location.search);
                const error = urlParams.get('error');
                const card = urlParams.get('card');

                if (error) {
                    if (card === 'register') {
                        document.getElementById('register-error').style.display = 'block';
                        document.getElementById('register-error-text').textContent = error;
                        document.getElementById('flipCard').classList.add('flipped');
                    } else {
                        document.getElementById('login-error').style.display = 'block';
                        document.getElementById('login-error-text').textContent = error;
                    }
                }

                if (card === 'register') {
                    document.getElementById('flipCard').classList.add('flipped');
                }

                const newUrl = window.location.pathname;
                window.history.replaceState({}, document.title, newUrl);
            });
        </script>
        
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
